<title>買い物リスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f5f4f0;--w:#fff;--g1:#f0efe9;--g2:#e0ddd4;--g3:#9b9890;--tx:#1a1916;--tx2:#6b6860;--gn:#2d5a27;--gn2:#e8f0e7;--rd:#c0392b;--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
#hdr{background:var(--w);border-bottom:1px solid var(--g2);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:100;}
#hdr-title{font-size:17px;font-weight:700;}
#settings-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--g1);cursor:pointer;font-size:16px;}
#tabs{background:var(--w);border-bottom:1px solid var(--g2);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:56px;z-index:99;padding:0 12px;}
#tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.tab.on{color:var(--gn);border-bottom-color:var(--gn);}
.tab-n{background:#e74c3c;color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;}
.tab.on .tab-n{background:#c0392b;color:#fff;}
#tab-add{padding:10px 8px;font-size:20px;color:var(--g3);cursor:pointer;display:flex;align-items:center;}
#main{padding:12px 16px 120px;max-width:600px;margin:0 auto;}
#add-box{background:var(--w);border-radius:var(--r);border:1px solid var(--g2);margin-bottom:12px;overflow:hidden;}
#add-row{display:flex;align-items:center;gap:8px;padding:10px 12px;}
#add-input{flex:1;border:none;background:transparent;font-size:15px;font-family:inherit;color:var(--tx);outline:none;}
#add-input::placeholder{color:var(--g3);}
#mic-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--g1);cursor:pointer;font-size:15px;flex-shrink:0;}
#mic-btn.rec{background:#fee;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#do-add{padding:8px 18px;background:var(--gn);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;flex-shrink:0;font-family:inherit;}
#aisle-row{padding:0 12px 10px;}
#aisle-sel{width:100%;border:1px solid var(--g2);border-radius:var(--rs);padding:8px;font-size:13px;font-family:inherit;color:var(--tx);background:var(--g1);outline:none;}
#staples-toggle{padding:9px 12px;background:var(--g1);border-top:1px solid var(--g2);font-size:12px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
#staples-panel{border-top:1px solid var(--g2);padding:10px 12px;display:none;}
#staples-panel.open{display:block;}
#staple-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.s-cat{padding:5px 12px;border-radius:20px;border:1px solid var(--g2);font-size:12px;cursor:pointer;background:var(--w);color:var(--tx2);}
.s-cat.on{background:var(--gn);color:#fff;border-color:var(--gn);}
#staple-chips{display:flex;gap:6px;flex-wrap:wrap;}
.s-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--g2);font-size:13px;cursor:pointer;background:var(--w);transition:all .2s;position:relative;overflow:hidden;}
.s-chip.added{background:var(--gn2);border-color:var(--gn);color:var(--gn);transform:scale(1.05);}
/* clear checked btn */
#clear-btn-wrap{display:flex;justify-content:flex-end;margin-bottom:8px;}
#clear-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--rd);background:transparent;color:var(--rd);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
/* aisle section */
.a-sec{margin-bottom:8px;border-radius:var(--r);overflow:hidden;border:1px solid var(--g2);background:var(--w);}
.a-hdr{padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.a-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.a-lbl{font-size:13px;font-weight:600;flex:1;}
.a-cnt{font-size:12px;color:var(--g3);}
.a-chev{font-size:11px;color:var(--g3);transition:transform .2s;}
.a-sec.col .a-chev{transform:rotate(-90deg);}
.a-sec.col .a-body{display:none;}
.a-prog{height:3px;background:var(--g2);}
.a-prog-fill{height:100%;transition:width .3s;}
/* item */
.iw{position:relative;overflow:hidden;border-top:1px solid var(--g2);}
.del-bg{position:absolute;right:0;top:0;bottom:0;width:88px;background:var(--rd);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;cursor:pointer;user-select:none;}
.si{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--w);transition:transform .2s;position:relative;touch-action:pan-y;user-select:none;}
.si.faded{opacity:.4;}
.chk{width:28px;height:28px;border-radius:50%;border:2px solid var(--g2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;}
.chk.done{background:var(--gn);border-color:var(--gn);color:#fff;}
.iname{flex:1;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.iname.done{text-decoration:line-through;color:var(--g3);}
.qty-c{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.qbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--g2);background:var(--g1);color:var(--tx);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;}
.qbtn:active{background:var(--g2);}
.qnum{font-size:14px;min-width:26px;text-align:center;cursor:pointer;padding:3px 0;border-bottom:1px dashed var(--g2);}
.empty{text-align:center;padding:48px 24px;color:var(--g3);}
/* undo */
#undo-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 18px;border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:500;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);}
#undo-bar.show{opacity:1;pointer-events:all;}
#undo-btn{color:#7dd87d;font-weight:700;cursor:pointer;border:none;background:transparent;font-size:13px;}
/* settings */
#settings{display:none;padding:12px 16px 80px;max-width:600px;margin:0 auto;}
#settings.show{display:block;}
#main-wrap.hide{display:none;}
.set-card{background:var(--w);border-radius:var(--r);border:1px solid var(--g2);margin-bottom:12px;overflow:hidden;}
.set-grp{border-top:1px solid var(--g2);padding:10px 14px;font-size:13px;font-weight:600;background:var(--g1);display:flex;align-items:center;gap:8px;}
.set-grp:first-child{border-top:none;}
.set-row{display:flex;align-items:center;gap:8px;padding:13px 14px;border-top:1px solid var(--g2);}
.set-row.dragging{opacity:.4;background:var(--g1);}
.set-row.drag-over{border-top:2px solid var(--gn);}
.set-name{flex:1;font-size:14px;}
.set-meta{font-size:12px;color:var(--g3);}
.set-add{padding:13px 14px;display:flex;align-items:center;gap:6px;border-top:1px solid var(--g2);cursor:pointer;color:var(--gn);font-size:13px;font-weight:500;}
.ebtn{border:none;background:transparent;cursor:pointer;font-size:14px;padding:4px 6px;color:var(--tx2);}
.dbtn{border:none;background:transparent;cursor:pointer;font-size:15px;padding:4px 8px;color:var(--rd);font-weight:700;}
.drag-handle{cursor:grab;padding:4px 8px;color:var(--g3);font-size:18px;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.back{font-size:13px;color:var(--gn);cursor:pointer;}
/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--w);border-radius:20px 20px 0 0;width:100%;max-width:600px;padding:20px 20px 44px;transform:translateY(16px);transition:transform .2s;}
.ov.open .modal{transform:translateY(0);}
.m-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.m-label{font-size:12px;color:var(--tx2);margin-bottom:5px;}
.m-field{margin-bottom:12px;}
.m-inp{width:100%;border:1px solid var(--g2);border-radius:var(--rs);padding:10px 12px;font-size:15px;font-family:inherit;outline:none;background:var(--g1);}
.m-inp:focus{border-color:var(--gn);}
.cp{display:flex;gap:8px;flex-wrap:wrap;}
.csw{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.csw.on{border-color:#333;}
.m-acts{display:flex;gap:8px;margin-top:16px;}
.mbtn{flex:1;padding:12px;border-radius:var(--rs);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--g2);background:var(--g1);color:var(--tx);}
.mbtn-p{background:var(--gn);color:#fff;border-color:var(--gn);}
#qty-ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:250;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s;}
#qty-ov.open{opacity:1;pointer-events:all;}
#qty-box{background:var(--w);border-radius:var(--r);padding:20px;width:200px;text-align:center;}
#qty-item-name{display:none;}
#qty-inp{width:100%;border:1px solid var(--g2);border-radius:var(--rs);padding:10px;font-size:24px;text-align:center;outline:none;font-family:inherit;}
#qty-inp:focus{border-color:var(--gn);}
#qty-ok{margin-top:12px;width:100%;padding:10px;background:var(--gn);color:#fff;border:none;border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;}

.setting-option{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);}
.setting-option:last-child{border-bottom:none;}
.setting-option-title{font-size:14px;font-weight:600;color:var(--tx);}
.setting-option-sub{font-size:11px;color:var(--tx2);margin-top:2px;}
.switch{position:relative;display:inline-block;width:46px;height:26px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ddd;transition:.2s;border-radius:26px;}
.slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:white;transition:.2s;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.switch input:checked + .slider{background:var(--gn);}
.switch input:checked + .slider:before{transform:translateX(20px);}

</style>
</head>
<body>
<div id="hdr">
  <div id="hdr-left"><span id="hdr-title">🛒 買い物リスト</span></div>
  <button id="settings-btn">⚙️</button>
</div>
<div id="main-wrap">
  <div id="tabs"><div id="tab-add">＋</div></div>
  <div id="main"></div>
</div>

<script>
var SB = supabase.createClient(
  'https://pfobhvsslpxuiglfacss.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmb2JodnNzbHB4dWlnbGZhY3NzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODg4NzIsImV4cCI6MjA5Mjg2NDg3Mn0.yyYgQnDrT2OTgKHsTtNPbNLesMUd_mGYlqZlU6mLZQE'
);
var COLORS = ['#e74c3c','#e67e22','#f39c12','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#795548','#607d8b'];
var stores=[], aisles=[], staples=[], items=[];

// Audio feedback
var audioCtx=null;
function playPop(type) {
  try {
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type==='add') { osc.frequency.value=880; gain.gain.setValueAtTime(0.3,audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15); }
    else if(type==='delete') { osc.frequency.value=330; gain.gain.setValueAtTime(0.25,audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2); }
    osc.start(); osc.stop(audioCtx.currentTime+0.2);
  } catch(e) {}
}
var activeStore=null, editAisleId=null, aisleStoreId=null, editStapleId=null, qtyItemId=null, pendingStapleId=null;
var stapleNoQtyMap = {};
try { stapleNoQtyMap = JSON.parse(localStorage.getItem('stapleNoQtyMap') || '{}'); } catch(e) { stapleNoQtyMap = {}; }
var staplesOpen=false, staplesCat=null, isRec=false, recog=null;
var undoStack=null, undoTimer=null;
var localOps={}; // track local op IDs to avoid RT echo

async function boot() {
  localStorage.removeItem('stapleQtyPromptOff');
  await reload();
  // Single channel for all tables
  SB.channel('app-changes')
    .on('postgres_changes',{event:'*',schema:'public'},function(payload){
      var tbl = payload.table;
      if(tbl==='shopping_items'){
        if(payload.eventType==='INSERT' && payload.new){
          var exists=false;
          for(var i=0;i<items.length;i++){if(items[i].id===payload.new.id){exists=true;break;}}
          if(!exists) items.push(payload.new);
        } else if(payload.eventType==='UPDATE' && payload.new){
          var found=false;
          for(var i=0;i<items.length;i++){if(items[i].id===payload.new.id){items[i]=payload.new;found=true;break;}}
          if(!found) items.push(payload.new);
        } else if(payload.eventType==='DELETE' && payload.old){
          items=items.filter(function(i){return i.id!==payload.old.id;});
        }
        drawAll();
      } else {
        reload().then(function(){ drawAll(); });
      }
    })
    .subscribe(function(status){
      console.log('Realtime status:', status);
    });
  drawAll();
}

async function reload() {
  var r = await Promise.all([
    SB.from('stores').select('*').order('sort_order'),
    SB.from('aisles').select('*').order('sort_order'),
    SB.from('staples').select('*').order('sort_order'),
    SB.from('shopping_items').select('*').order('created_at')
  ]);
  stores  = r[0].data || [];
  aisles  = r[1].data || [];
  staples = r[2].data || [];
  items   = r[3].data || [];
  if (!activeStore && stores.length) activeStore = stores[0].id;
}

function markLocal(id) { if(id){ localOps[id]=true; setTimeout(function(){ delete localOps[id]; },3000); } }

function drawAll() { drawTabs(); drawMain(); if(document.getElementById('settings').classList.contains('show')) drawSettings(); }

function drawTabs() {
  var el = document.getElementById('tabs');
  var h = '';
  for (var i=0; i<stores.length; i++) {
    var s = stores[i];
    var n = 0;
    for (var j=0; j<items.length; j++) { if(items[j].store_id===s.id && !items[j].checked) n++; }
    var badge = n ? '<span class="tab-n">'+n+'</span>' : '';
    var on = s.id===activeStore ? ' on' : '';
    h += '<div class="tab'+on+'" onclick="setStore(\''+s.id+'\')">'+s.name+badge+'</div>';
  }
  h += '<div id="tab-add" onclick="openOv(\'store-ov\')">＋</div>';
  el.innerHTML = h;
}

function drawMain() {
  var el = document.getElementById('main');
  if (!activeStore) { el.innerHTML = '<div class="empty">⚙️設定からスーパーを追加してください</div>'; return; }
  var sa = aisles.filter(function(a){ return a.store_id===activeStore; });
  var si = items.filter(function(i){ return i.store_id===activeStore; });
  var ss = staples.filter(function(s){ for(var i=0;i<sa.length;i++){if(sa[i].id===s.aisle_id)return true;} return false; }).sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0);});
  var hasChecked = si.some(function(i){ return i.checked; });

  var h = '';
  // Add box
  h += '<div id="add-box">';
  h += '<div id="add-row">';
  h += '<input id="add-input" placeholder="アイテムを追加..." onkeydown="if(event.key===\'Enter\')doAdd()">';
  h += '<button id="mic-btn" class="'+(isRec?'rec':'')+'" onclick="toggleMic()">🎤</button>';
  h += '<button id="do-add" onclick="doAdd()">追加</button>';
  h += '</div>';
  h += '<div id="aisle-row"><select id="aisle-sel"><option value="">売り場（未分類）</option>';
  for (var i=0;i<sa.length;i++) h += '<option value="'+sa[i].id+'">'+sa[i].name+'</option>';
  h += '</select></div>';
  h += '<div id="staples-toggle" onclick="toggleStaples()"><span>📋 定番リストから追加</span><span>'+(staplesOpen?'▲':'▼')+'</span></div>';
  h += '<div id="staples-panel"'+(staplesOpen?' class="open"':'')+'>';
  h += '<div id="staple-cats">';
  h += '<div class="s-cat'+(staplesCat===null?' on':'')+'" onclick="setCat(null)">すべて</div>';
  for (var i=0;i<sa.length;i++) {
    var a=sa[i], on=staplesCat===a.id;
    var style=on?'background:'+a.color+';border-color:'+a.color+';color:#fff':'color:'+a.color+';border-color:'+a.color+'40';
    h += '<div class="s-cat'+(on?' on':'')+'" style="'+style+'" onclick="setCat(\''+a.id+'\')">'+a.name+'</div>';
  }
  h += '</div><div id="staple-chips">';
  var filtered = ss.filter(function(s){ return staplesCat===null||s.aisle_id===staplesCat; });
  if (!filtered.length) h += '<span style="color:var(--g3);font-size:13px;">定番アイテムがありません</span>';
  for (var i=0;i<filtered.length;i++) {
    var st = filtered[i];
    var alreadyAdded = false;
    for (var j=0;j<items.length;j++) {
      if (items[j].store_id===activeStore && items[j].name===st.name && items[j].aisle_id===st.aisle_id && !items[j].checked) {
        alreadyAdded = true;
        break;
      }
    }
    h += '<div class="s-chip'+(alreadyAdded?' added':'')+'" id="chip-'+st.id+'" onclick="addFromStaple(\''+st.id+'\')">'+st.name+'</div>';
  }
  h += '</div></div></div>';

  // Clear checked button
  if (hasChecked) {
    h += '<div id="clear-btn-wrap"><button id="clear-btn" onclick="clearChecked()">✓ 購入済みをすべて削除</button></div>';
  }

  // Items by aisle
  if (!si.length) {
    h += '<div class="empty">リストは空です ✅</div>';
  } else {
    for (var ai=0;ai<sa.length;ai++) {
      var aisle=sa[ai];
      var ait=si.filter(function(it){ return it.aisle_id===aisle.id; });
      if (!ait.length) continue;
      var done=ait.filter(function(it){return it.checked;}).length;
      var pct=Math.round(done/ait.length*100);
      h += '<div class="a-sec" id="sec-'+aisle.id+'">';
      h += '<div class="a-hdr" style="background:'+aisle.color+'12" onclick="togSec(\''+aisle.id+'\')">';
      h += '<div class="a-dot" style="background:'+aisle.color+'"></div>';
      h += '<div class="a-lbl">'+aisle.name+'</div>';
      h += '<div class="a-cnt">'+done+'/'+ait.length+'</div>';
      h += '<div class="a-chev">▾</div></div>';
      h += '<div class="a-prog"><div class="a-prog-fill" style="width:'+pct+'%;background:'+aisle.color+'60"></div></div>';
      // Sort items by staple sort_order
      ait.sort(function(a,b){
        var sa=9999,sb=9999;
        for(var k=0;k<staples.length;k++){
          if(staples[k].name===a.name&&staples[k].aisle_id===aisle.id) sa=staples[k].sort_order||9999;
          if(staples[k].name===b.name&&staples[k].aisle_id===aisle.id) sb=staples[k].sort_order||9999;
        }
        return sa-sb;
      });
      h += '<div class="a-body">';
      for (var ii=0;ii<ait.length;ii++) h += itemHTML(ait[ii]);
      h += '</div></div>';
    }
    var noA=si.filter(function(it){return !it.aisle_id;});
    if (noA.length) {
      h += '<div class="a-sec" id="sec-none">';
      h += '<div class="a-hdr" style="background:#f0f0f0" onclick="togSec(\'none\')">';
      h += '<div class="a-dot" style="background:#999"></div><div class="a-lbl">未分類</div>';
      h += '<div class="a-cnt">'+noA.length+'</div><div class="a-chev">▾</div></div>';
      h += '<div class="a-body">';
      for (var ii=0;ii<noA.length;ii++) h += itemHTML(noA[ii]);
      h += '</div></div>';
    }
  }
  el.innerHTML = h;
  attachSwipe();
}

function itemHTML(it) {
  var dc = it.checked ? ' done' : '';
  var fc = it.checked ? ' faded' : '';
  var id = it.id;
  var nm = it.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var nmRaw = it.name.replace(/'/g,'&#39;');
  var qty = it.quantity;
  var h = '<div class="iw" id="iw-'+id+'">';
  if (!it.checked) h += '<div class="del-bg" onclick="delItem(\''+id+'\')">削除</div>';
  h += '<div class="si'+fc+'" id="si-'+id+'">';
  h += '<div class="chk'+dc+'" onclick="togChk(\''+id+'\')">'+( it.checked?'✓':'' )+'</div>';
  h += '<div class="iname'+dc+'">'+nm+'</div>';
  if (!it.checked) {
    h += '<div class="qty-c">';
    h += '<button class="qbtn" onclick="chgQty(\''+id+'\',-1)">−</button>';
    h += '<div class="qnum" onclick="openQty(\''+id+'\',\''+nmRaw+'\','+qty+')">'+qty+'</div>';
    h += '<button class="qbtn" onclick="chgQty(\''+id+'\',1)">＋</button>';
    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

function attachSwipe() {
  var els = document.querySelectorAll('.si:not(.faded)');
  for (var i=0;i<els.length;i++) {
    (function(el){
      var sx=0,sy=0,dx=0,sw=false;
      el.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; dx=0; sw=el.classList.contains('sw'); },{passive:true});
      el.addEventListener('touchmove',function(e){
        dx=e.touches[0].clientX-sx;
        if(Math.abs(e.touches[0].clientY-sy)>Math.abs(dx)) return;
        var mv=sw?Math.min(0,Math.max(-88,-88+dx)):Math.max(-88,Math.min(0,dx));
        el.style.transition='none'; el.style.transform='translateX('+mv+'px)';
      },{passive:true});
      el.addEventListener('touchend',function(){
        el.style.transition='transform .2s';
        if(!sw&&dx<-44){ el.style.transform='translateX(-88px)'; el.classList.add('sw'); sw=true; }
        else if(sw&&dx>44){ el.style.transform='translateX(0)'; el.classList.remove('sw'); sw=false; }
        else { el.style.transform=sw?'translateX(-88px)':'translateX(0)'; }
      });
    })(els[i]);
  }
}

// --- Actions ---
function setStore(id) { activeStore=id; drawAll(); }
function toggleStaples() { staplesOpen=!staplesOpen; drawMain(); }
function setCat(id) { staplesCat=id; drawMain(); }
function togSec(id) { var el=document.getElementById('sec-'+id); if(el) el.classList.toggle('col'); }

async function doAdd() {
  var inp = document.getElementById('add-input');
  var name = inp.value.trim();
  if (!name || !activeStore) return;
  var aid = document.getElementById('aisle-sel').value || null;
  var r = await SB.from('shopping_items').insert({store_id:activeStore,aisle_id:aid,name:name,quantity:1,checked:false}).select().single();
  if (r.data) items.push(r.data);
  // Auto-register staple
  if (aid) {
    var already=false;
    for(var i=0;i<staples.length;i++){if(staples[i].name===name&&staples[i].aisle_id===aid){already=true;break;}}
    if (!already) {
      var mx=0;
      for(var i=0;i<staples.length;i++){if(staples[i].aisle_id===aid&&(staples[i].sort_order||0)>mx)mx=staples[i].sort_order||0;}
      var sr=await SB.from('staples').insert({aisle_id:aid,name:name,sort_order:mx+1}).select().single();
      if(sr.data) staples.push(sr.data);
    }
  }
  inp.value=''; drawAll();
}

function isStapleNoQty(s){
  if(!s) return false;
  return !!(s.no_qty_input || stapleNoQtyMap[s.id]);
}
function setStapleNoQty(id,on){
  stapleNoQtyMap[id] = !!on;
  if(!on) delete stapleNoQtyMap[id];
  localStorage.setItem('stapleNoQtyMap', JSON.stringify(stapleNoQtyMap));
  for(var i=0;i<staples.length;i++){
    if(staples[i].id===id){ staples[i].no_qty_input=!!on; break; }
  }
  drawAll();
}

function addFromStaple(sid) {
  var s=null;
  for(var i=0;i<staples.length;i++){if(staples[i].id===sid){s=staples[i];break;}}
  if(!s||!activeStore) return;

  // この定番アイテムだけ「数量入力なし」がONの場合は、前回数量（なければ1）でそのまま追加
  if(isStapleNoQty(s)){
    saveStapleQty(sid, s.last_qty || 1);
    return;
  }

  pendingStapleId=sid;
  qtyItemId=null;
  document.getElementById('qty-inp').value=s.last_qty || 1;
  document.getElementById('qty-ov').classList.add('open');

  var inp=document.getElementById('qty-inp');
  inp.focus();
  inp.select();
  setTimeout(function(){inp.focus(); inp.select();},50);
}

async function saveStapleQty(sid, qty) {
  var s=null;
  for(var i=0;i<staples.length;i++){if(staples[i].id===sid){s=staples[i];break;}}
  if(!s||!activeStore) return;

  playPop('add');

  var ex=null;
  for(var i=0;i<items.length;i++){
    if(items[i].store_id===activeStore && items[i].name===s.name && items[i].aisle_id===s.aisle_id && !items[i].checked){ex=items[i];break;}
  }
  if(ex){
    await SB.from('shopping_items').update({quantity:qty}).eq('id',ex.id);
    ex.quantity=qty;
  } else {
    var r=await SB.from('shopping_items').insert({store_id:activeStore,aisle_id:s.aisle_id,name:s.name,quantity:qty,checked:false}).select().single();
    if(r.data) items.push(r.data);
  }

  s.last_qty = qty;
  SB.from('staples').update({last_qty:qty}).eq('id',s.id);
  drawAll();
}

function saveLastQtyForItem(it){
  if(!it || !it.aisle_id) return;
  for(var i=0;i<staples.length;i++){
    if(staples[i].name===it.name && staples[i].aisle_id===it.aisle_id){
      staples[i].last_qty=it.quantity;
      SB.from('staples').update({last_qty:it.quantity}).eq('id',staples[i].id);
      break;
    }
  }
}

async function togChk(id) {
  var it=null;
  for(var i=0;i<items.length;i++){if(items[i].id===id){it=items[i];break;}}
  if(!it) return;
  var newChecked = !it.checked;
  // Update locally FIRST for instant UI response
  it.checked=newChecked;
  drawAll();
  // チェックして消す前の数量を定番リスト側に保存
  if(newChecked) saveLastQtyForItem(it);
  // Save to DB
  await SB.from('shopping_items').update({checked:newChecked}).eq('id',id);
}

async function chgQty(id, d) {
  var it=null;
  for(var i=0;i<items.length;i++){if(items[i].id===id){it=items[i];break;}}
  if(!it) return;
  var nq=Math.max(1,it.quantity+d);
  // Update locally FIRST for instant response
  it.quantity=nq;
  drawAll();
  // Save to DB
  await SB.from('shopping_items').update({quantity:nq}).eq('id',id);
}

async function delItem(id) {
  var it=null;
  for(var i=0;i<items.length;i++){if(items[i].id===id){it=items[i];break;}}
  if(!it) return;
  undoStack=[{id:it.id,store_id:it.store_id,aisle_id:it.aisle_id,name:it.name,quantity:it.quantity,checked:it.checked}];
  // スワイプ削除でも数量を定番リスト側に残す
  saveLastQtyForItem(it);
  // Remove locally FIRST for instant response
  items=items.filter(function(i){return i.id!==id;});
  drawAll();
  showUndo('「'+it.name+'」を削除');
  // Delete from DB
  await SB.from('shopping_items').delete().eq('id',id);
}

async function clearChecked() {
  var si=items.filter(function(i){return i.store_id===activeStore&&i.checked;});
  if(!si.length) return;
  playPop('delete');
  undoStack=si.map(function(it){return {id:it.id,store_id:it.store_id,aisle_id:it.aisle_id,name:it.name,quantity:it.quantity,checked:it.checked};});
  var ids=si.map(function(i){return i.id;});
  // 購入済みをまとめて消す時も数量を定番リスト側に残す
  for(var i=0;i<si.length;i++) saveLastQtyForItem(si[i]);
  // Remove locally FIRST
  items=items.filter(function(i){return ids.indexOf(i.id)===-1;});
  drawAll();
  showUndo(si.length+'件の購入済みを削除');
  // Delete from DB
  await SB.from('shopping_items').delete().in('id',ids);
}

function showUndo(msg) {
  if(undoTimer) clearTimeout(undoTimer);
  document.getElementById('undo-msg').textContent=msg;
  document.getElementById('undo-bar').classList.add('show');
  undoTimer=setTimeout(function(){ document.getElementById('undo-bar').classList.remove('show'); undoStack=null; },5000);
}

async function doUndo() {
  if(!undoStack||!undoStack.length) return;
  for(var i=0;i<undoStack.length;i++){
    var u=undoStack[i];
    var r=await SB.from('shopping_items').insert({store_id:u.store_id,aisle_id:u.aisle_id,name:u.name,quantity:u.quantity,checked:u.checked}).select().single();
    if(r.data) items.push(r.data);
  }
  document.getElementById('undo-bar').classList.remove('show');
  undoStack=null; if(undoTimer) clearTimeout(undoTimer);
  drawAll();
}

function openQty(id,name,qty){
  qtyItemId=id;
  pendingStapleId=null;
  document.getElementById('qty-inp').value=qty;
  document.getElementById('qty-ov').classList.add('open');
  var inp=document.getElementById('qty-inp');
  inp.focus();
  inp.select();
  setTimeout(function(){inp.focus(); inp.select();},50);
}
async function saveQty(){
  var q=Math.max(1, parseInt(document.getElementById('qty-inp').value,10)||1);
  if(pendingStapleId){
    await saveStapleQty(pendingStapleId, q);
  } else if(qtyItemId){
    var it=null;
    for(var i=0;i<items.length;i++){if(items[i].id===qtyItemId){it=items[i];break;}}
    if(it){
      await SB.from('shopping_items').update({quantity:q}).eq('id',qtyItemId);
      it.quantity=q;
      drawAll();
    }
  }
  document.getElementById('qty-ov').classList.remove('open');
  qtyItemId=null;
  pendingStapleId=null;
}
document.getElementById('qty-ov').addEventListener('click',function(e){if(e.target===document.getElementById('qty-ov')){document.getElementById('qty-ov').classList.remove('open'); qtyItemId=null; pendingStapleId=null;}});
document.getElementById('qty-inp').addEventListener('keydown',function(e){if(e.key==='Enter')saveQty();});

function toggleMic(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){alert('このブラウザは音声入力非対応です');return;}
  if(isRec){recog.stop();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR(); recog.lang='ja-JP';
  recog.onresult=function(e){var inp=document.getElementById('add-input');if(inp)inp.value=e.results[0][0].transcript;};
  recog.onend=function(){isRec=false;var b=document.getElementById('mic-btn');if(b)b.className='';};
  recog.start(); isRec=true; var b=document.getElementById('mic-btn');if(b)b.className='rec';
}

function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');editAisleId=null;editStapleId=null;}
document.querySelectorAll('.ov').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});});

function drawCP(sel){
  var h='';
  for(var i=0;i<COLORS.length;i++) h+='<div class="csw'+(COLORS[i]===sel?' on':'')+'" style="background:'+COLORS[i]+'" onclick="pickColor(\''+COLORS[i]+'\')"></div>';
  document.getElementById('cp').innerHTML=h;
}
function pickColor(c){drawCP(c);}
function getColor(){var el=document.querySelector('.csw.on');return el?el.style.backgroundColor:COLORS[0];}

// Aisle
function openAddAisle(sid){
  aisleStoreId=sid; editAisleId=null;
  document.getElementById('aisle-m-title').textContent='売り場を追加';
  document.getElementById('aisle-name-inp').value='';
  drawCP(COLORS[0]); openOv('aisle-ov');
}
function openEditAisle(id){
  var a=null; for(var i=0;i<aisles.length;i++){if(aisles[i].id===id){a=aisles[i];break;}} if(!a)return;
  editAisleId=id; aisleStoreId=a.store_id;
  document.getElementById('aisle-m-title').textContent='売り場を編集';
  document.getElementById('aisle-name-inp').value=a.name;
  drawCP(a.color); openOv('aisle-ov');
}
async function saveAisle(){
  var name=document.getElementById('aisle-name-inp').value.trim();
  var color=getColor();
  if(!name) return;
  if(editAisleId){
    await SB.from('aisles').update({name:name,color:color}).eq('id',editAisleId);
    for(var i=0;i<aisles.length;i++){if(aisles[i].id===editAisleId){aisles[i].name=name;aisles[i].color=color;break;}}
  } else {
    var mx=0; for(var i=0;i<aisles.length;i++){if(aisles[i].store_id===aisleStoreId&&(aisles[i].sort_order||0)>mx)mx=aisles[i].sort_order||0;}
    var r=await SB.from('aisles').insert({store_id:aisleStoreId,name:name,color:color,sort_order:mx+1}).select().single();
    if(r.data){aisles.push(r.data);aisles.sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0);});}
  }
  closeOv('aisle-ov'); drawAll();
}
async function deleteAisle(id){
  if(!confirm('この売り場を削除しますか？')) return;
  await SB.from('staples').delete().eq('aisle_id',id);
  await SB.from('shopping_items').update({aisle_id:null}).eq('aisle_id',id);
  await SB.from('aisles').delete().eq('id',id);
  staples=staples.filter(function(s){return s.aisle_id!==id;});
  for(var i=0;i<items.length;i++){if(items[i].aisle_id===id)items[i].aisle_id=null;}
  aisles=aisles.filter(function(a){return a.id!==id;});
  drawAll();
}

// Store
async function saveStore(){
  var name=document.getElementById('store-name-inp').value.trim(); if(!name)return;
  var mx=0; for(var i=0;i<stores.length;i++){if((stores[i].sort_order||0)>mx)mx=stores[i].sort_order||0;}
  var r=await SB.from('stores').insert({name:name,sort_order:mx+1}).select().single();
  if(r.data){stores.push(r.data);activeStore=r.data.id;}
  closeOv('store-ov'); document.getElementById('store-name-inp').value=''; drawAll();
}
async function deleteStore(id){
  if(!confirm('このスーパーを削除しますか？')) return;
  await SB.from('shopping_items').delete().eq('store_id',id);
  var sa=aisles.filter(function(a){return a.store_id===id;});
  for(var i=0;i<sa.length;i++) await SB.from('staples').delete().eq('aisle_id',sa[i].id);
  await SB.from('aisles').delete().eq('store_id',id);
  await SB.from('stores').delete().eq('id',id);
  items=items.filter(function(i){return i.store_id!==id;});
  sa.forEach(function(a){staples=staples.filter(function(s){return s.aisle_id!==a.id;});});
  aisles=aisles.filter(function(a){return a.store_id!==id;});
  stores=stores.filter(function(s){return s.id!==id;});
  if(activeStore===id) activeStore=stores.length?stores[0].id:null;
  drawAll();
}

// Staples
function openAddStaple(){
  editStapleId=null;
  document.getElementById('staple-m-title').textContent='定番アイテムを追加';
  document.getElementById('staple-name-inp').value='';
  document.getElementById('staple-noqty-inp').checked=false;
  var sel=document.getElementById('staple-aisle-inp');
  sel.innerHTML=''; for(var i=0;i<aisles.length;i++) sel.innerHTML+='<option value="'+aisles[i].id+'">'+aisles[i].name+'</option>';
  openOv('staple-ov');
}
function openEditStaple(id){
  var s=null; for(var i=0;i<staples.length;i++){if(staples[i].id===id){s=staples[i];break;}} if(!s)return;
  editStapleId=id;
  document.getElementById('staple-m-title').textContent='定番アイテムを編集';
  document.getElementById('staple-name-inp').value=s.name;
  document.getElementById('staple-noqty-inp').checked=isStapleNoQty(s);
  var sel=document.getElementById('staple-aisle-inp');
  sel.innerHTML=''; for(var i=0;i<aisles.length;i++) sel.innerHTML+='<option value="'+aisles[i].id+'"'+(aisles[i].id===s.aisle_id?' selected':'')+'>'+aisles[i].name+'</option>';
  openOv('staple-ov');
}
async function saveStaple(){
  var name=document.getElementById('staple-name-inp').value.trim();
  var aid=document.getElementById('staple-aisle-inp').value;
  var noQty=document.getElementById('staple-noqty-inp').checked;
  if(!name||!aid) return;
  if(editStapleId){
    await SB.from('staples').update({name:name,aisle_id:aid}).eq('id',editStapleId);
    for(var i=0;i<staples.length;i++){if(staples[i].id===editStapleId){staples[i].name=name;staples[i].aisle_id=aid;staples[i].no_qty_input=noQty;break;}}
    stapleNoQtyMap[editStapleId]=!!noQty;
    if(!noQty) delete stapleNoQtyMap[editStapleId];
    localStorage.setItem('stapleNoQtyMap', JSON.stringify(stapleNoQtyMap));
  } else {
    var mx=0; for(var i=0;i<staples.length;i++){if(staples[i].aisle_id===aid&&(staples[i].sort_order||0)>mx)mx=staples[i].sort_order||0;}
    var r=await SB.from('staples').insert({aisle_id:aid,name:name,sort_order:mx+1}).select().single();
    if(r.data){
      r.data.no_qty_input=noQty;
      staples.push(r.data);
      if(noQty) stapleNoQtyMap[r.data.id]=true;
      localStorage.setItem('stapleNoQtyMap', JSON.stringify(stapleNoQtyMap));
    }
  }
  closeOv('staple-ov'); drawAll();
}
async function deleteStaple(id){
  if(!confirm('この定番アイテムを削除しますか？')) return;
  await SB.from('staples').delete().eq('id',id);
  staples=staples.filter(function(s){return s.id!==id;});
  drawAll();
}

// ===== DRAG & DROP for settings =====
var dragSrcId=null, dragSrcType=null;

// PC drag
function onDragStart(e, id, type) {
  dragSrcId=id; dragSrcType=type;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain', id);
}
function onDragOver(e, id, type) {
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.set-row').forEach(function(r){ r.classList.remove('drag-over'); });
  var el=document.getElementById('dr-'+type+'-'+id);
  if(el && id!==dragSrcId) el.classList.add('drag-over');
}
function onDragLeave(id, type) {
  var el=document.getElementById('dr-'+type+'-'+id);
  if(el) el.classList.remove('drag-over');
}
async function onDrop(e, id, type) {
  if(e.preventDefault) e.preventDefault();
  if(!dragSrcId || dragSrcId===id || dragSrcType!==type) return;
  document.querySelectorAll('.set-row').forEach(function(r){ r.classList.remove('drag-over','dragging'); });
  await reorder(dragSrcId, id, type);
  dragSrcId=null;
}
function onDragEnd(id,type){
  document.querySelectorAll('.set-row').forEach(function(r){r.classList.remove('dragging','drag-over');});
}

async function reorder(fromId, toId, type) {
  var arr = type==='store' ? stores : type==='aisle' ? aisles : staples;
  var fromIdx=-1, toIdx=-1;
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===fromId) fromIdx=i;
    if(arr[i].id===toId) toIdx=i;
  }
  if(fromIdx<0||toIdx<0) return;
  var moved = arr.splice(fromIdx,1)[0];
  arr.splice(toIdx,0,moved);
  for(var i=0;i<arr.length;i++) arr[i].sort_order=i+1;
  // Update immediately in UI
  drawSettings();
  // Then save to DB (all at once using Promise.all for speed)
  var tbl = type==='store' ? 'stores' : type==='aisle' ? 'aisles' : 'staples';
  var updates = arr.map(function(item,i){ return SB.from(tbl).update({sort_order:i+1}).eq('id',item.id); });
  await Promise.all(updates);
}

// Touch drag for mobile
var TD = { id:null, type:null, el:null, clone:null, overEl:null };

function onTouchDragStart(e, id, type) {
  e.stopPropagation();
  TD.id=id; TD.type=type;
  TD.el=document.getElementById('dr-'+type+'-'+id);
  TD.el.classList.add('dragging');
  // Create floating clone
  TD.clone=TD.el.cloneNode(true);
  var rect=TD.el.getBoundingClientRect();
  TD.clone.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:0.85;pointer-events:none;z-index:999;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);border-radius:8px;';
  document.body.appendChild(TD.clone);
}
function onTouchDragMove(e, id, type) {
  if(!TD.clone) return;
  e.preventDefault();
  var t=e.touches[0];
  TD.clone.style.top=(t.clientY-24)+'px';
  // Find row under finger
  TD.clone.style.display='none';
  var under=document.elementFromPoint(t.clientX, t.clientY);
  TD.clone.style.display='';
  document.querySelectorAll('.set-row').forEach(function(r){ r.classList.remove('drag-over'); });
  if(under) {
    var row=under.closest('.set-row');
    if(row && row.id && row.id!=='dr-'+type+'-'+id) {
      TD.overEl=row;
      row.classList.add('drag-over');
    } else { TD.overEl=null; }
  }
}
function onTouchDragEnd(e, id, type) {
  if(TD.clone){TD.clone.remove();TD.clone=null;}
  if(TD.el){TD.el.classList.remove('dragging');TD.el=null;}
  document.querySelectorAll('.set-row').forEach(function(r){ r.classList.remove('drag-over'); });
  if(TD.overEl) {
    var targetId=TD.overEl.id.replace('dr-'+type+'-','');
    if(targetId && targetId!==id) reorder(id, targetId, type);
    TD.overEl=null;
  }
  TD.id=null; TD.type=null;
}

// Settings

function drawAppSettings(){
  var el=document.getElementById('app-settings');
  if(!el) return;
  el.innerHTML = '';
  el.style.display='none';
  var label = el.previousElementSibling;
  if(label) label.style.display='none';
}

function drawSettings() {
  drawAppSettings();
  var se=document.getElementById('store-settings');
  var ste=document.getElementById('staple-settings');
  var h='';
  // Stores with drag
  for(var i=0;i<stores.length;i++){
    var s=stores[i];
    var sa=aisles.filter(function(a){return a.store_id===s.id;});
    // Store row
    h+='<div class="set-row" id="dr-store-'+s.id+'" draggable="true"';
    h+=' ondragstart="onDragStart(event,\''+s.id+'\',\'store\')"';
    h+=' ondragover="onDragOver(event,\''+s.id+'\',\'store\')"';
    h+=' ondragleave="onDragLeave(\''+s.id+'\',\'store\')"';
    h+=' ondrop="onDrop(event,\''+s.id+'\',\'store\')"';
    h+=' ondragend="onDragEnd(\''+s.id+'\',\'store\')">';
    h+='<div class="drag-handle" ontouchstart="onTouchDragStart(event,\''+s.id+'\',\'store\')" ontouchmove="onTouchDragMove(event,\''+s.id+'\',\'store\')" ontouchend="onTouchDragEnd(event,\''+s.id+'\',\'store\')">⠿</div>';
    h+='<div class="set-name" style="font-weight:600">'+s.name+'</div>';
    h+='<button class="dbtn" onclick="deleteStore(\''+s.id+'\')">削除</button>';
    h+='</div>';
    // Aisles under store
    for(var j=0;j<sa.length;j++){
      var a=sa[j];
      h+='<div class="set-row" id="dr-aisle-'+a.id+'" draggable="true" style="padding-left:36px"';
      h+=' ondragstart="onDragStart(event,\''+a.id+'\',\'aisle\')"';
      h+=' ondragover="onDragOver(event,\''+a.id+'\',\'aisle\')"';
      h+=' ondragleave="onDragLeave(\''+a.id+'\',\'aisle\')"';
      h+=' ondrop="onDrop(event,\''+a.id+'\',\'aisle\')"';
      h+=' ondragend="onDragEnd(\''+a.id+'\',\'aisle\')">';
      h+='<div class="drag-handle" ontouchstart="onTouchDragStart(event,\''+a.id+'\',\'aisle\')" ontouchmove="onTouchDragMove(event,\''+a.id+'\',\'aisle\')" ontouchend="onTouchDragEnd(event,\''+a.id+'\',\'aisle\')">⠿</div>';
      h+='<div style="width:10px;height:10px;border-radius:50%;background:'+a.color+';flex-shrink:0"></div>';
      h+='<div class="set-name">'+a.name+'</div>';
      h+='<button class="ebtn" onclick="openEditAisle(\''+a.id+'\')">✏️</button>';
      h+='<button class="dbtn" onclick="deleteAisle(\''+a.id+'\')">✕</button>';
      h+='</div>';
    }
    h+='<div class="set-add" onclick="openAddAisle(\''+s.id+'\')">＋ 売り場を追加</div>';
  }
  h+='<div class="set-add" onclick="openOv(\'store-ov\')">＋ スーパーを追加</div>';
  se.innerHTML=h;

  // Staples with drag
  h='';
  for(var i=0;i<aisles.length;i++){
    var a=aisles[i];
    var as=staples.filter(function(s){return s.aisle_id===a.id;}).sort(function(x,y){return(x.sort_order||0)-(y.sort_order||0);});
    if(!as.length) continue;
    h+='<div class="set-grp" style="color:'+a.color+'">';
    h+='<div style="width:8px;height:8px;border-radius:50%;background:'+a.color+';margin-right:6px;flex-shrink:0"></div>'+a.name;
    h+='</div>';
    for(var j=0;j<as.length;j++){
      var s=as[j];
      h+='<div class="set-row" id="dr-staple-'+s.id+'" draggable="true"';
      h+=' ondragstart="onDragStart(event,\''+s.id+'\',\'staple\')"';
      h+=' ondragover="onDragOver(event,\''+s.id+'\',\'staple\')"';
      h+=' ondragleave="onDragLeave(\''+s.id+'\',\'staple\')"';
      h+=' ondrop="onDrop(event,\''+s.id+'\',\'staple\')"';
      h+=' ondragend="onDragEnd(\''+s.id+'\',\'staple\')">';
      h+='<div class="drag-handle" ontouchstart="onTouchDragStart(event,\''+s.id+'\',\'staple\')" ontouchmove="onTouchDragMove(event,\''+s.id+'\',\'staple\')" ontouchend="onTouchDragEnd(event,\''+s.id+'\',\'staple\')">⠿</div>';
      h+='<div class="set-name">'+s.name+(isStapleNoQty(s)?'<span style="font-size:11px;color:var(--gn);margin-left:6px;">数量なし</span>':'')+'</div>';
      h+='<label class="switch" title="数量入力なし"><input type="checkbox" '+(isStapleNoQty(s)?'checked':'')+' onchange="setStapleNoQty(\''+s.id+'\',this.checked)"><span class="slider"></span></label>';
      h+='<button class="ebtn" onclick="openEditStaple(\''+s.id+'\')">✏️</button>';
      h+='<button class="dbtn" onclick="deleteStaple(\''+s.id+'\')">✕</button>';
      h+='</div>';
    }
  }
  h+='<div class="set-add" onclick="openAddStaple()">＋ 定番アイテムを追加</div>';
  ste.innerHTML=h;
}

document.getElementById('settings-btn').addEventListener('click',function(){
  document.getElementById('main-wrap').classList.add('hide');
  document.getElementById('settings').classList.add('show');
  document.getElementById('hdr-left').innerHTML='';

});

boot();
